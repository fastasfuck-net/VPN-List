name: Update VPN Gate IPs

on:
  schedule:
    - cron: "0 */6 * * *"   # alle 6 Stunden
  workflow_dispatch:          # manuell auslösbar

permissions:
  contents: write

jobs:
  update-vpngate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download & Parse VPN Gate CSV
        run: |
          echo "Downloading VPN Gate server list..."

          curl -s "https://www.vpngate.net/api/iphone/" \
            --max-time 30 \
            --retry 3 \
            -o vpngate_raw.csv

          grep -v "^\*" vpngate_raw.csv \
            | tail -n +2 \
            | awk -F',' '{print $2}' \
            | grep -E '^([0-9]{1,3}\.){3}[0-9]{1,3}$' \
            | sort -u \
            > vpngate_ips.txt

          COUNT=$(wc -l < vpngate_ips.txt)
          echo "Extracted $COUNT IPs from VPN Gate"

          if [ "$COUNT" -eq 0 ]; then
            echo "ERROR: No IPs extracted, aborting."
            exit 1
          fi

      - name: Update IP.txt
        run: |
          touch IP.txt

          # Alle alten VPNGate-Zeilen entfernen (Zeilen die mit "# VPNGate" enden)
          grep -v "# VPNGate$" IP.txt > ip_clean.txt || true

          # Neue VPNGate IPs mit Kommentar anhängen
          while read -r ip; do
            echo "$ip  # VPNGate"
          done < vpngate_ips.txt >> ip_clean.txt

          mv ip_clean.txt IP.txt

          COUNT=$(wc -l < vpngate_ips.txt)
          echo "Replaced old VPNGate entries with $COUNT fresh IPs"

      - name: Cleanup temp files
        run: rm -f vpngate_raw.csv vpngate_ips.txt

      - name: Commit & Push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add IP.txt

          if git diff --cached --quiet; then
            echo "No changes to IP.txt – skipping commit."
          else
            TIMESTAMP=$(date -u "+%Y-%m-%d %H:%M UTC")
            git commit -m "chore: update VPN Gate IPs (${TIMESTAMP})"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          fi
